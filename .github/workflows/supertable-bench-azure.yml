name: Benchmark (Azure)

# Runs a selected benchmark (`bench` input) on a per-run ephemeral Azure
# VM in the storage account's region (transfers ride the Azure backbone,
# not the public internet). The VM builds with an sccache compile cache
# in Azure Blob — shared across branches — runs the bench, and is torn
# down.
#
# Benchmarks are A/B: the PR ref and base `main` are built and run on the
# *same* VM and compared against each other, so the deltas reflect the code
# change, not cross-host / neighbour / frequency variance. Both arms run here,
# so no metric is read from or written to object storage (only sccache is).

on:
  workflow_dispatch:
    inputs:
      bench:
        description: "What to run."
        required: false
        default: supertable_all
        type: choice
        options: [superfile, supertable, supertable_all, supertable_fts, supertable_vector, supertable_sql, all]
      docs:
        description: "Doc count (plain integer, NOT 1M/100K — those do not parse)"
        required: false
        default: "1000000"
        type: string
      vm_size:
        description: "Azure VM size."
        required: false
        default: "Standard_D8s_v7"
        type: string
      location:
        description: "VM region."
        required: false
        default: "eastus"
        type: string
      ref:
        description: "Git ref / SHA to benchmark (the PR arm)."
        required: false
        default: "main"
        type: string
      base_ref:
        description: "A/B base arm ref (default main; set = ref for same-host noise)."
        required: false
        default: "main"
        type: string
      is_fork_pr:
        description: "Simulate a fork PR (runner checks out base tooling, not the ref; routes to the approval-gated env). For verifying fork-safe checkout."
        required: false
        default: false
        type: boolean
      keep_table:
        description: "Keep the bench blob prefix after the run (debug)."
        required: false
        default: false
        type: boolean
      timeout_minutes:
        description: "Hard auto-stop; VM is torn down when hit."
        required: false
        # A/B runs build + run two arms on one VM, so ~twice a single run.
        default: "60"
        type: string
      skip_calibration:
        description: "Vector only: skip recall calibration, report fixed-config cold latency (no recall gate)."
        required: false
        default: false
        type: boolean
      bench_gate_metric:
        description: "Warm gate metric used for benchmark deltas (min|p50|p90)."
        required: false
        default: "p90"
        type: string
      bench_cpuset:
        description: "CPU set for bench pinning (example: 2-7). Empty = auto-pick from available cores."
        required: false
        default: ""
        type: string
      pr_number:
        description: "PR number for comment mode; ignored when summary_destination=step_summary."
        required: false
        default: ""
        type: string
      noise_threshold_pct:
        description: "Min |Δ%| vs base_ref to surface in the benchmark summary."
        required: false
        default: "5"
        type: string
      summary_destination:
        description: "Publish benchmark summary to PR comment or Actions run summary."
        required: false
        default: step_summary
        type: choice
        options: [pr_comment, step_summary]
  # Callable from other workflows (e.g. the PR group in ci.yml). Same
  # inputs; `choice` isn't valid here so `bench` is a string.
  workflow_call:
    inputs:
      bench:           { type: string, required: false, default: supertable_all }
      docs:            { type: string, required: false, default: "1000000" }
      vm_size:         { type: string, required: false, default: "Standard_D8s_v7" }
      location:        { type: string, required: false, default: eastus }
      ref:             { type: string, required: false, default: main }
      base_ref:        { type: string, required: false, default: main }
      keep_table:      { type: boolean, required: false, default: false }
      timeout_minutes: { type: string, required: false, default: "60" }
      # Discriminator appended to resource names so parallel callers
      # (e.g. matrix legs sharing one run_id) don't collide / cross-delete.
      name_suffix:     { type: string, required: false, default: "" }
      # Vector only: skip recall calibration, fixed-config cold latency only.
      skip_calibration: { type: boolean, required: false, default: false }
      # Warm gate metric used for benchmark deltas (min|p50|p90).
      bench_gate_metric: { type: string, required: false, default: "p90" }
      # CPU set for bench pinning (example: 2-7). Empty = auto-pick.
      bench_cpuset: { type: string, required: false, default: "" }
      # PR number for comment mode.
      pr_number:       { type: string, required: false, default: "" }
      # Min |Δ%| vs base_ref to surface in the benchmark summary.
      noise_threshold_pct: { type: string, required: false, default: "5" }
      # Publish benchmark summary to PR comment or run summary. Defaults to the
      # Actions run summary; set pr_comment to also post a sticky PR comment.
      summary_destination: { type: string, required: false, default: step_summary }
      # Fork PR ⇒ gate the run on maintainer approval (see `environment`).
      is_fork_pr:      { type: boolean, required: false, default: false }

permissions:
  id-token: write       # Azure OIDC federated login
  contents: read        # clone the repo on the VM via the job token
  pull-requests: write  # post the sticky bench-results comment on a PR

# Concurrency is owned by the caller (per-PR cancel in ci.yml); a manual
# dispatch needs none — runs are isolated by run_id and self-clean.

env:
  # Pre-existing RG the bench service principal is scoped to (Contributor
  # on this RG only). The workflow creates per-run resources inside it,
  # never the RG itself.
  RG: rg-infino-bench
  # Unique per run; `name_suffix` keeps parallel callers that share a
  # run_id (matrix legs) from colliding on the same VM.
  VM: bench-vm-${{ github.run_id }}${{ inputs.name_suffix }}
  ADMIN: azureuser
  SCCACHE_VERSION: v0.8.2
  # Keepalive so a dead-but-unclosed SSH session fails in ~60s instead of
  # hanging until the job timeout (ServerAliveInterval × CountMax).
  SSH_OPTS: "-o StrictHostKeyChecking=no -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
  # Set "false" to suppress PR comments (summary-only).
  POST_PR_COMMENT: "true"

jobs:
  benchmark:
    runs-on: ubuntu-latest
    # `ci`: same-repo, no gate. `bench`: required reviewers, so a maintainer
    # approves before secrets reach fork code. The env name is the OIDC
    # subject (repo:…:environment:<name>) — each needs its own Azure
    # federated credential.
    environment: ${{ inputs.is_fork_pr && 'bench' || 'ci' }}
    # Auto-stop ceiling on VM billing; teardown runs on timeout.
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    steps:
      # Runner-side checkout is TRUSTED context (base GITHUB_TOKEN + secrets)
      # and only runs infino's own tooling (bench_summary.py) over metrics
      # scp'd back from the VM — it never needs the code under test. So it must
      # NOT fetch fork code: a fork PR could swap the helper script and run
      # arbitrary code here with secrets (a "pwn request"). actions/checkout
      # now refuses fork code under pull_request_target for exactly this reason,
      # and an environment approval does not make it safe (a reviewer won't
      # reliably catch a malicious helper-script edit). So fork PRs check out
      # the base default branch's trusted tooling; same-repo PRs (already
      # trusted) may use the ref under test. The fork's code-under-test is
      # cloned/built/run only on the isolated, approval-gated VM below.
      # Cleans the workdir, so it must precede baseline staging.
      - name: Checkout (runner-side tooling)
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.is_fork_pr && github.event.repository.default_branch || inputs.ref }}

      - name: Resolve bench selection
        id: resolve
        run: |
          set -euo pipefail
          # Map the `bench` input to (a) the cargo bench target's positional
          # cell selectors and (b) the report JSONs it emits
          # (target/infino-bench/<name>.json) for baseline restore / publish.
          # The supertable_* tokens select one cell each: CI fans them out
          # one-per-VM so a modality's numbers stay isolated.
          case "${{ inputs.bench }}" in
            superfile)                 args="superfile";         reports="superfile_fts superfile_vector sql" ;;
            supertable|supertable_all) args="supertable";        reports="supertable supertable_fts supertable_vector supertable_sql" ;;
            supertable_fts)            args="supertable fts";    reports="supertable_fts" ;;
            supertable_vector)         args="supertable vector"; reports="supertable_vector" ;;
            supertable_sql)            args="supertable sql";    reports="supertable_sql" ;;
            all)                       args="all";               reports="supertable supertable_fts supertable_vector supertable_sql superfile_fts superfile_vector sql" ;;
            *) echo "::error::unknown bench ${{ inputs.bench }}"; exit 1 ;;
          esac
          echo "args=$args"       >> "$GITHUB_OUTPUT"
          echo "reports=$reports" >> "$GITHUB_OUTPUT"
          echo "args=[$args] reports=[$reports]"

      - name: Validate bench gate metric
        run: |
          set -euo pipefail
          case "${{ inputs.bench_gate_metric }}" in
            min|p50|p90) ;;
            *)
              echo "::error::invalid bench_gate_metric='${{ inputs.bench_gate_metric }}' (allowed: min|p50|p90)"
              exit 1
              ;;
          esac

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Provision ephemeral VM
        id: provision
        run: |
          set -euo pipefail
          LOC="${{ inputs.location }}"
          SIZE="${{ inputs.vm_size }}"

          # Tags attribute spend by purpose / run; delete-after lets the
          # bench janitor reclaim this if teardown is skipped (cancel / lost runner).
          DELETE_AFTER="$(date -u -d '+3 hours' +%Y-%m-%dT%H:%M:%SZ)"
          TAGS=(purpose=supertable-bench "run-id=${{ github.run_id }}" "ref=${{ inputs.ref }}" auto-delete=true "delete-after=${DELETE_AFTER}")

          # Every resource is named with the unique per-run VM name so
          # teardown can delete this run's resources by exact name (never
          # a prefix that could match another run). No default inbound
          # rule; the only SSH allow is the runner-IP /32 added below.
          az vm create \
            -g "$RG" -n "$VM" \
            --image Ubuntu2204 \
            --size "$SIZE" \
            --admin-username "$ADMIN" \
            --generate-ssh-keys \
            --public-ip-sku Standard \
            --os-disk-size-gb 128 \
            --nsg-rule NONE \
            --nsg "${VM}-nsg" \
            --public-ip-address "${VM}-pip" \
            --vnet-name "${VM}-vnet" \
            --subnet "${VM}-subnet" \
            --os-disk-name "${VM}-osdisk" \
            --tags "${TAGS[@]}" \
            -o none

          RUNNER_IP="$(curl -s https://api.ipify.org)"
          az network nsg rule create \
            -g "$RG" --nsg-name "${VM}-nsg" -n allow-ssh-runner --priority 300 \
            --access Allow --protocol Tcp --direction Inbound \
            --destination-port-ranges 22 \
            --source-address-prefixes "${RUNNER_IP}/32" -o none

          VM_IP="$(az vm show -d -g "$RG" -n "$VM" --query publicIps -o tsv)"
          echo "vm_ip=$VM_IP" >> "$GITHUB_OUTPUT"
          echo "Provisioned $VM ($SIZE) at $VM_IP in $LOC"

      - name: Wait for SSH
        run: |
          set -euo pipefail
          VM_IP="${{ steps.provision.outputs.vm_ip }}"
          for i in $(seq 1 30); do
            if ssh $SSH_OPTS -o ConnectTimeout=5 \
                 "${ADMIN}@${VM_IP}" true 2>/dev/null; then
              echo "SSH up after ${i} tries"; exit 0
            fi
            sleep 10
          done
          echo "::error::SSH never came up"; exit 1

      - name: Clone repo + toolchain + sccache (on VM)
        # Fail fast if provisioning stalls — well under the job budget.
        timeout-minutes: 12
        run: |
          set -euo pipefail
          VM_IP="${{ steps.provision.outputs.vm_ip }}"
          # Single-quoted heredoc: the body is literal; only the
          # ssh-line assignments reach the VM as env.
          ssh $SSH_OPTS "${ADMIN}@${VM_IP}" \
            "GH_TOKEN='${{ github.token }}' \
             REPO='${{ github.repository }}' \
             REF='${{ inputs.ref }}' \
             SCCACHE_VERSION='${{ env.SCCACHE_VERSION }}' \
             bash -s" <<'REMOTE'
          set -euo pipefail

          if ! command -v cargo >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf \
              --retry 5 --retry-connrefused --retry-delay 2 https://sh.rustup.rs \
              | sh -s -- -y --default-toolchain stable --profile minimal
          fi

          sudo DEBIAN_FRONTEND=noninteractive apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential pkg-config cmake clang protobuf-compiler git

          # Keep CPU behavior stable across both A/B arms.
          for p in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
            [ -f "$p" ] && echo performance | sudo tee "$p" >/dev/null || true
          done
          # Best-effort turbo control: keep constant where supported.
          [ -f /sys/devices/system/cpu/intel_pstate/no_turbo ] \
            && echo 1 | sudo tee /sys/devices/system/cpu/intel_pstate/no_turbo >/dev/null || true
          [ -f /sys/devices/system/cpu/cpufreq/boost ] \
            && echo 0 | sudo tee /sys/devices/system/cpu/cpufreq/boost >/dev/null || true
          echo "cpu governor: $(cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor 2>/dev/null || echo n/a)"
          echo "intel turbo: $(cat /sys/devices/system/cpu/intel_pstate/no_turbo 2>/dev/null || echo n/a)"
          echo "cpufreq boost: $(cat /sys/devices/system/cpu/cpufreq/boost 2>/dev/null || echo n/a)"

          # Prebuilt sccache (static musl, glibc-agnostic).
          if ! command -v sccache >/dev/null 2>&1; then
            TARBALL="sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl"
            curl -fsSL --retry 5 --retry-connrefused --retry-delay 2 \
              "https://github.com/mozilla/sccache/releases/download/${SCCACHE_VERSION}/${TARBALL}.tar.gz" \
              | tar -xz
            sudo install "${TARBALL}/sccache" /usr/local/bin/sccache
          fi

          rm -rf "$HOME/infino-src"
          git clone --filter=blob:none \
            "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" "$HOME/infino-src"
          cd "$HOME/infino-src"
          # The VM is the isolated, approval-gated place where the code under
          # test actually runs, so it may hold fork code. It clones the BASE
          # repo, so the ref resolves directly for a same-repo PR. For a FORK
          # PR the sha lives in the fork; it resolves here only if the base repo
          # exposes it via refs/pull/*. Diagnose which path fires so we know
          # whether the VM clone must instead target the fork repo directly
          # (thread head_repo through) — rather than silently benchmarking the
          # wrong code.
          echo "[vm-clone] REPO=$REPO REF=$REF"
          if git checkout "$REF" 2>/dev/null; then
            echo "[vm-clone] resolved directly from clone (same-repo ref)"
          elif git fetch --depth 1 origin "$REF" && git checkout FETCH_HEAD; then
            echo "[vm-clone] resolved via 'fetch origin $REF' (base-repo PR-head object) — fork code IS reachable from the base repo; head_repo threading NOT required"
          else
            echo "::error::[vm-clone] ref $REF is not obtainable from $REPO — the fork's code is not reachable from the base repo. The VM clone must target the fork repo directly (thread head_repo through bench.yml). Benchmarking base code here would be misleading, so failing."
            exit 1
          fi
          echo "[vm-clone] HEAD=$(git rev-parse HEAD) (requested $REF)"
          REMOTE

      - name: Build (sccache, on VM)
        run: |
          set -euo pipefail
          VM_IP="${{ steps.provision.outputs.vm_ip }}"
          ssh $SSH_OPTS "${ADMIN}@${VM_IP}" \
            "AZURE_STORAGE_ACCOUNT_NAME='${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}' \
             AZURE_STORAGE_ACCOUNT_KEY='${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}' \
             INFINO_REAL_AZURE_CONTAINER='${{ secrets.INFINO_REAL_AZURE_CONTAINER }}' \
             REF='${{ inputs.ref }}' \
             BASE_REF='${{ inputs.base_ref }}' \
             bash -s" <<'REMOTE' 2>&1 | tee /tmp/build.log
          set -euo pipefail
          source "$HOME/.cargo/env"
          cd "$HOME/infino-src"

          # Content-addressed compile cache in Azure Blob, shared across
          # branches. CARGO_INCREMENTAL=0 is required (it conflicts with
          # sccache). Reuses the bench container under a key prefix;
          # connection string from the same account.
          export RUSTC_WRAPPER=sccache
          export CARGO_INCREMENTAL=0
          export SCCACHE_AZURE_BLOB_CONTAINER="$INFINO_REAL_AZURE_CONTAINER"
          export SCCACHE_AZURE_KEY_PREFIX=sccache
          export SCCACHE_AZURE_CONNECTION_STRING="DefaultEndpointsProtocol=https;AccountName=${AZURE_STORAGE_ACCOUNT_NAME};AccountKey=${AZURE_STORAGE_ACCOUNT_KEY};EndpointSuffix=core.windows.net"
          sccache --start-server || true

          # Build the unified bench target at one ref and save its binary so
          # the run step execs it directly — no cargo at run time means no
          # re-fingerprint / rebuild.
          build_arm() { # $1 = git ref, $2 = output binary path
            git checkout "$1" 2>/dev/null \
              || { git fetch --depth 1 origin "$1" && git checkout FETCH_HEAD; }
            echo "building $(git rev-parse --short HEAD) -> $2"
            cargo bench --no-run
            local bin
            bin="$(find target/release/deps -maxdepth 1 -type f -executable -name 'bench-*' \
                     -printf '%T@ %p\n' | sort -rn | head -1 | cut -d' ' -f2-)"
            test -n "$bin" && test -x "$bin" || { echo "::error::bench binary not found"; exit 1; }
            cp "$bin" "$2"
          }

          # PR arm = the ref under test. The run step reads this path.
          build_arm "$REF" "$HOME/bench-pr"
          printf '%s\n' "$HOME/bench-pr" > "$HOME/bench-bin"

          # Base arm. Restore the PR checkout after so the run step's cwd is `ref`.
          git fetch --depth 1 origin "$BASE_REF"
          build_arm FETCH_HEAD "$HOME/bench-main"
          git checkout "$REF" 2>/dev/null \
            || { git fetch --depth 1 origin "$REF" && git checkout FETCH_HEAD; }
          sccache --show-stats || true
          REMOTE

      # Run the main arm; its metric JSONs stay in place as the PR arm's
      # baseline (Report::load reads them as `prev`).
      - name: Same-host baseline (A/B main arm)
        env:
          REPORTS: ${{ steps.resolve.outputs.reports }}
        run: |
          set -euo pipefail
          VM_IP="${{ steps.provision.outputs.vm_ip }}"
          ssh $SSH_OPTS "${ADMIN}@${VM_IP}" \
            "AZURE_STORAGE_ACCOUNT_NAME='${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}' \
             AZURE_STORAGE_ACCOUNT_KEY='${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}' \
             INFINO_REAL_AZURE_CONTAINER='${{ secrets.INFINO_REAL_AZURE_CONTAINER }}' \
             INFINO_BENCH_SUPERFILE_DOCS='${{ inputs.docs }}' \
             INFINO_BENCH_SUPERTABLE_DOCS='${{ inputs.docs }}' \
             BENCH_ARGS='${{ steps.resolve.outputs.args }}' \
             CPUSET='${{ inputs.bench_cpuset }}' \
             SKIP_CALIBRATION='${{ inputs.skip_calibration }}' \
             bash -s" <<'REMOTE' 2>&1 | tee /tmp/build-main.log
          set -euo pipefail
          cd "$HOME/infino-src"
          export INFINO_BENCH_STORE=azure
          [ "$SKIP_CALIBRATION" = "true" ] && export INFINO_BENCH_SKIP_CALIBRATION=1
          ulimit -n "$(ulimit -Hn)"
          if ! CPUSET="$(bash "$HOME/infino-src/.github/scripts/resolve_cpuset.sh" "$CPUSET")"; then
            echo "::error::bench cpuset validation failed"
            exit 1
          fi
          echo "bench cpuset: $CPUSET"
          echo "===== BASELINE (main arm) ${BENCH_ARGS} START ====="
          taskset -c "$CPUSET" "$HOME/bench-main" $BENCH_ARGS 2>&1
          echo "===== BASELINE (main arm) END ====="
          REMOTE
          # Stage the main-arm JSONs on the runner too — the AI-summary step
          # diffs them against the PR arm's metrics (collected later).
          mkdir -p baseline
          for j in $REPORTS; do
            scp $SSH_OPTS \
              "${ADMIN}@${VM_IP}:infino-src/target/infino-bench/${j}.json" "baseline/${j}.json" \
              2>/dev/null && echo "baseline staged: $j" \
              || echo "::warning::no main-arm metrics for $j — PR arm renders (new)"
          done

      - name: Run benchmark (on VM)
        run: |
          set -euo pipefail
          VM_IP="${{ steps.provision.outputs.vm_ip }}"
          ssh $SSH_OPTS "${ADMIN}@${VM_IP}" \
            "AZURE_STORAGE_ACCOUNT_NAME='${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}' \
             AZURE_STORAGE_ACCOUNT_KEY='${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}' \
             INFINO_REAL_AZURE_CONTAINER='${{ secrets.INFINO_REAL_AZURE_CONTAINER }}' \
             INFINO_BENCH_SUPERFILE_DOCS='${{ inputs.docs }}' \
             INFINO_BENCH_SUPERTABLE_DOCS='${{ inputs.docs }}' \
             BENCH_ARGS='${{ steps.resolve.outputs.args }}' \
             CPUSET='${{ inputs.bench_cpuset }}' \
             KEEP='${{ inputs.keep_table }}' \
             SKIP_CALIBRATION='${{ inputs.skip_calibration }}' \
             bash -s" <<'REMOTE' 2>&1 | tee /tmp/bench.log
          set -euo pipefail
          cd "$HOME/infino-src"
          export INFINO_BENCH_STORE=azure
          [ "$KEEP" = "true" ] && export INFINO_BENCH_KEEP_TABLE=1
          [ "$SKIP_CALIBRATION" = "true" ] && export INFINO_BENCH_SKIP_CALIBRATION=1
          # The multi-commit build holds many superfile files + object-store
          # connections open at once; raise the fd soft limit to the hard
          # max so commits don't hit EMFILE ("too many open files").
          ulimit -n "$(ulimit -Hn)"
          if ! CPUSET="$(bash "$HOME/infino-src/.github/scripts/resolve_cpuset.sh" "$CPUSET")"; then
            echo "::error::bench cpuset validation failed"
            exit 1
          fi
          echo "bench cpuset: $CPUSET"
          echo "fd limit: $(ulimit -n)"

          # Exec the unified bench binary with the resolved positional
          # selection (tier / modality tokens). Intentionally unquoted:
          # $BENCH_ARGS is a token list.
          BIN="$(cat "$HOME/bench-bin")"
          echo "===== BENCH ${BENCH_ARGS} START ====="
          taskset -c "$CPUSET" "$BIN" $BENCH_ARGS 2>&1
          echo "===== BENCH ${BENCH_ARGS} END ====="
          REMOTE

      - name: Summarize results
        if: ${{ !cancelled() }}
        run: |
          # Best-effort parser: never abort early; exit codes are set
          # explicitly below.
          set +e -u -o pipefail
          # Build the report body into a file, then fan it out to both the
          # run summary and (on a PR) a sticky comment. One source, two sinks.
          # Body to a file; flushed to the summary on exit, reused by the
          # comment step.
          SUMMARY=/tmp/summary.md
          : > "$SUMMARY"
          trap 'cat "$SUMMARY" >> "$GITHUB_STEP_SUMMARY"' EXIT
          LOG=/tmp/bench.clean
          {
            echo "## Benchmark \`${{ inputs.bench }}\` — Azure (${{ inputs.location }})"
            echo ""
            echo "- docs: \`${{ inputs.docs }}\` · vm: \`${{ inputs.vm_size }}\` · ref: \`${{ inputs.ref }}\`"
            echo ""
          } >> "$SUMMARY"

          # Combine build + run logs (build warnings live in build.log,
          # the report + runtime panics in bench.log), ANSI-stripped.
          : > "$LOG"
          for f in /tmp/build.log /tmp/bench.log; do
            [ -s "$f" ] && sed -r 's/\x1b\[[0-9;]*m//g' "$f" >> "$LOG"
          done
          if [ ! -s "$LOG" ]; then
            echo "::error::No output produced — provisioning or SSH failed (see job logs)."
            echo "_No output produced — provisioning or SSH failed._" >> "$SUMMARY"
            exit 1
          fi

          # The report banner ("══ … ══") and table are present only when
          # at least one shape succeeded. Capture from the first banner to
          # the end, then drop the inter-bench noise that falls between
          # report tables: the run-step "===== …" markers and the benches'
          # "[tag] …" progress lines. Report rows never start that way.
          if grep -q '══' "$LOG"; then
            REPORT_OK=1
            {
              echo "### Results"
              echo '```'
              awk '/══/{f=1} f' "$LOG" | grep -vE '^=====|^\[[a-z][a-z_]*\]'
              echo '```'
            } >> "$SUMMARY"
          else
            REPORT_OK=0
            echo "**❌ No report table — every shape failed.**" >> "$SUMMARY"
          fi

          # Panics, runtime errors, and compile errors (error[E…]); the
          # panic line carries the full chain.
          ERRORS="$(grep -nE 'panicked|error\[|HTTP error|storage error|transient error|AppendFlush|PointerParse|child exited|no shapes produced|skipped:|content-hash mismatch|short read' "$LOG" || true)"
          # Hand the error lines to the AI-summary step (same job, /tmp persists).
          printf '%s\n' "$ERRORS" > /tmp/bench.errors
          if [ -n "$ERRORS" ]; then
            {
              echo "### 🛑 Errors & panics"
              echo '```'
              printf '%s\n' "$ERRORS"
              echo '```'
            } >> "$SUMMARY"
            while IFS= read -r line; do
              [ -n "$line" ] && echo "::error::${line}"
            done <<< "$(grep -E 'panicked at|AppendFlush|storage error|HTTP error' "$LOG" | head -n 8)"
          fi

          # Unique build/harness warnings.
          WARNINGS="$(grep -E '^warning:|: warning:|\bwarning:' "$LOG" | sed 's/^[0-9]*://' | sort -u || true)"
          if [ -n "$WARNINGS" ]; then
            WCOUNT="$(printf '%s\n' "$WARNINGS" | grep -c . || true)"
            {
              echo "### ⚠️ Warnings (${WCOUNT} unique)"
              echo '```'
              printf '%s\n' "$WARNINGS" | head -n 40
              echo '```'
            } >> "$SUMMARY"
            echo "::warning::${WCOUNT} unique build/harness warnings — see step summary."
          fi

          echo "" >> "$SUMMARY"
          echo "_Full output attached as the \`supertable-bench-log\` artifact._" >> "$SUMMARY"

          if [ "$REPORT_OK" -ne 1 ]; then
            echo "::error::Benchmark produced no results — every shape failed."
            exit 1
          fi

      # Pull this run's metric JSONs off the VM so the concise-summary step can
      # diff them against staged main-arm metrics. Best-effort per report.
      - name: Collect metrics for benchmark summary
        if: ${{ !cancelled() && (inputs.summary_destination == 'step_summary' || (inputs.summary_destination == 'pr_comment' && inputs.pr_number != '' && env.POST_PR_COMMENT == 'true')) }}
        env:
          REPORTS: ${{ steps.resolve.outputs.reports }}
        run: |
          set -uo pipefail
          VM_IP="${{ steps.provision.outputs.vm_ip }}"
          mkdir -p current
          for j in $REPORTS; do
            scp $SSH_OPTS \
              "${ADMIN}@${VM_IP}:infino-src/target/infino-bench/${j}.json" "current/${j}.json" \
              2>/dev/null && echo "collected: $j" \
              || echo "no metrics for $j — skipping"
          done

      # Build the concise markdown summary from metric deltas (with deterministic
      # fallback if model narration is unavailable).
      - name: Generate benchmark summary
        if: ${{ !cancelled() && (inputs.summary_destination == 'step_summary' || (inputs.summary_destination == 'pr_comment' && inputs.pr_number != '' && env.POST_PR_COMMENT == 'true')) }}
        env:
          REPORTS: ${{ steps.resolve.outputs.reports }}
          BASELINE_DIR: baseline
          CURRENT_DIR: current
          OUT_FILE: /tmp/ai-summary.md
          BENCH_LABEL: ${{ inputs.bench }}
          BENCH_VM_SIZE: ${{ inputs.vm_size }}
          BENCH_LOCATION: ${{ inputs.location }}
          BENCH_CPUSET: ${{ inputs.bench_cpuset }}
          BENCH_GATE_METRIC: ${{ inputs.bench_gate_metric }}
          BASE_REF_LABEL: ${{ inputs.base_ref }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BENCH_NOISE_THRESHOLD_PCT: ${{ inputs.noise_threshold_pct }}
          AZURE_AI_ENDPOINT: ${{ secrets.AZURE_AI_ENDPOINT }}
          AZURE_AI_API_KEY: ${{ secrets.AZURE_AI_API_KEY }}
        run: |
          set -uo pipefail
          # Error lines captured by the Summarize step (empty file if none).
          ERRORS="$(cat /tmp/bench.errors 2>/dev/null || true)" \
            python3 .github/scripts/bench_summary.py

      - name: Publish benchmark summary to run summary
        if: ${{ !cancelled() && inputs.summary_destination == 'step_summary' }}
        run: |
          set -euo pipefail
          if [ -s /tmp/ai-summary.md ]; then
            {
              echo ""
              echo "### Benchmark summary"
              echo ""
              cat /tmp/ai-summary.md
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::No benchmark summary produced — see full results above."
          fi

      # Sticky PR comment, one per matrix leg. The hidden marker lets a new
      # push edit in place instead of stacking comments.
      - name: Post benchmark summary to PR
        if: ${{ !cancelled() && inputs.summary_destination == 'pr_comment' && inputs.pr_number != '' && env.POST_PR_COMMENT == 'true' }}
        uses: actions/github-script@v7
        env:
          MARKER: <!-- infino-bench:${{ inputs.bench }}${{ inputs.name_suffix }} -->
        with:
          script: |
            const fs = require('fs');
            // GitHub caps comment bodies at 65536 chars; full output is the artifact.
            const LIMIT = 60000;
            // The benchmark summary is the comment body; the full report stays in
            // the run's step summary + the uploaded log artifact.
            let body;
            try { body = fs.readFileSync('/tmp/ai-summary.md', 'utf8'); }
            catch {
              try { body = fs.readFileSync('/tmp/summary.md', 'utf8'); }
              catch { body = '_No summary produced — see the run logs._'; }
            }
            if (body.length > LIMIT) {
              body = body.slice(0, LIMIT) + '\n\n_…truncated — see the artifact._';
            }
            const marker = process.env.MARKER;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            body = `${marker}\n${body}\n\n[Full run ↗](${runUrl})`;

            const issue_number = Number('${{ inputs.pr_number }}');
            const { owner, repo } = context.repo;
            const existing = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 },
            ).then(cs => cs.find(c => c.body && c.body.includes(marker)));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Upload full log
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: supertable-bench-log
          path: |
            /tmp/build.log
            /tmp/bench.log
          if-no-files-found: warn

      - name: Teardown (always)
        if: always()
        env:
          # The auto-created NIC is the only resource az names for us:
          # "<vm>VMNic".
          NIC: ${{ env.VM }}VMNic
        run: |
          # Delete exactly this run's resources by name (VM is unique per
          # run, so no name can collide with another run), keeping the
          # shared RG. Ordered so dependencies release: VM frees the NIC
          # and disk; the NIC frees the IP/NSG/subnet. Each is best-effort
          # so a missing resource doesn't fail teardown.
          az vm delete            -g "$RG" -n "$VM"          --yes        || true
          az network nic delete   -g "$RG" -n "$NIC"                      || true
          az disk delete          -g "$RG" -n "${VM}-osdisk" --yes        || true
          az network public-ip delete -g "$RG" -n "${VM}-pip"             || true
          az network nsg delete   -g "$RG" -n "${VM}-nsg"                 || true
          az network vnet delete  -g "$RG" -n "${VM}-vnet"                || true
